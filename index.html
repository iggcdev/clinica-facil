<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clínica Fácil</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container py-4" id="auth">
    <h1 class="mb-4">Clínica Fácil</h1>
    <div id="login-section">
      <h2>Login</h2>
      <form id="login-form">
        <div class="mb-3">
          <label for="login-email" class="form-label">Email</label>
          <input type="email" class="form-control" id="login-email" required>
        </div>
        <div class="mb-3">
          <label for="login-password" class="form-label">Senha</label>
          <input type="password" class="form-control" id="login-password" required>
        </div>
        <button type="submit" class="btn btn-primary">Entrar</button>
        <button type="button" class="btn btn-link" id="show-register">Cadastrar</button>
      </form>
    </div>

    <div id="register-section" class="d-none">
      <h2>Cadastro</h2>
      <form id="register-form">
        <div class="mb-3">
          <label for="reg-name" class="form-label">Nome</label>
          <input type="text" class="form-control" id="reg-name" required>
        </div>
        <div class="mb-3">
          <label for="reg-email" class="form-label">Email</label>
          <input type="email" class="form-control" id="reg-email" required>
        </div>
        <div class="mb-3">
          <label for="reg-password" class="form-label">Senha</label>
          <input type="password" class="form-control" id="reg-password" required>
        </div>
        <button type="submit" class="btn btn-success">Registrar</button>
        <button type="button" class="btn btn-link" id="show-login">Voltar ao login</button>
      </form>
    </div>
  </div>

  <div class="container py-4 d-none" id="dashboard">
    <h1 class="mb-4">Bem-vindo, <span id="user-name"></span></h1>
    <div id="patient-area" class="d-none">
      <h2>Especialidades & Médicos</h2>
      <ul class="list-group mb-4" id="doctor-list"></ul>

      <h2>Agendar Consulta</h2>
      <form id="schedule-form" class="mb-4">
        <div class="mb-3">
          <label for="doctor-select" class="form-label">Médico</label>
          <select class="form-select" id="doctor-select" required></select>
        </div>
        <div class="mb-3">
          <label for="date-input" class="form-label">Data</label>
          <input type="date" class="form-control" id="date-input" required>
        </div>
        <button type="submit" class="btn btn-primary">Agendar</button>
      </form>

      <h2>Minhas Consultas</h2>
      <ul class="list-group mb-4" id="appointment-list"></ul>

      <h2>Histórico de Consultas</h2>
      <ul class="list-group" id="history-list"></ul>
    </div>

    <div id="doctor-area" class="d-none">
      <h2>Agenda do Médico</h2>
      <ul class="list-group" id="doctor-appointments"></ul>
    </div>

    <button class="btn btn-danger mt-4" id="logout">Sair</button>
  </div>

  <script src="script.js"></script>
</body>
</html>
